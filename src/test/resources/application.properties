# Tests run against the same PostgreSQL container (docker-compose.yml), so Docker must be up:
#   docker compose up -d
# They use an isolated 'bodiala_test' schema (create-drop) so they never touch the dev data in
# the default 'public' schema — Hibernate creates and drops that schema itself.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bodiala}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:bodiala}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:bodiala}
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.default_schema=bodiala_test
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true

# No RezLive credentials in tests — live API calls are expected to be refused, not attempted.
rezlive.base-url=http://localhost:0/none
rezlive.agent-code=
rezlive.user-name=
rezlive.api-key=
