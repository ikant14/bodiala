# Profile for running bodiala against the local rezlive-stub (../rezlive-stub).
# Activate with:  --spring.profiles.active=stub
#
# Placeholder credentials (NOT real) — the stub accepts any non-blank x-api-key. Set
# REZLIVE_API_KEY=invalid to exercise the error/502 path.
rezlive.base-url=http://localhost:9090/testpanel.php/action
rezlive.agent-code=${REZLIVE_AGENT_CODE:STUB-AGENT}
rezlive.user-name=${REZLIVE_USER_NAME:stub-user}
rezlive.api-key=${REZLIVE_API_KEY:stub-key}
