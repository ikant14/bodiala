spring.application.name=bodiala

# --- Provider selection + Hotelbeds APItude API --------------------------------
# Default supplier for requests that omit ?provider=. Currently only hotelbeds is implemented.
hotel.provider=${HOTEL_PROVIDER:hotelbeds}
# Hotelbeds creds — set via .env (copy .env.example) or env vars. Blank until you have a key/secret.
# apiKey + secret produce the per-request X-Signature; apiKey is also the Api-key header.
hotelbeds.base-url=${HOTELBEDS_BASE_URL:https://api.test.hotelbeds.com}
hotelbeds.api-key=${HOTELBEDS_API_KEY:}
hotelbeds.secret=${HOTELBEDS_SECRET:}
hotelbeds.language=${HOTELBEDS_LANGUAGE:ENG}
hotelbeds.source-market=${HOTELBEDS_SOURCE_MARKET:}
# Content catalog sync (POST /api/static-data/import when hotel.provider=hotelbeds). Bounded so a
# full ~250k-hotel sync doesn't blow the test key's daily quota — raise for a production sync.
hotelbeds.catalog-page-size=${HOTELBEDS_CATALOG_PAGE_SIZE:100}
hotelbeds.catalog-max-hotels=${HOTELBEDS_CATALOG_MAX_HOTELS:100}

# --- Local static-data cache (PostgreSQL, runs in Docker — see docker-compose.yml) --
# Start the DB first:  docker compose up -d   (dev.ps1 does this for you)
# For a real deployment set SPRING_DATASOURCE_URL/USERNAME/PASSWORD to the managed instance.
# The driver is auto-detected from the jdbc:postgresql: URL; the dialect from the connection.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bodiala}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:bodiala}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:bodiala}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
# Batch inserts for the (potentially large) hotel master.
spring.jpa.properties.hibernate.jdbc.batch_size=200
spring.jpa.properties.hibernate.order_inserts=true

# --- API docs -------------------------------------------------------------------
# Swagger UI:  http://localhost:8080/swagger-ui.html
# OpenAPI JSON: http://localhost:8080/v3/api-docs
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# --- JSON --------------------------------------------------------------------------
# Provider response DTOs (e.g. Hotelbeds) model only the fields we use — ignore the rest.
spring.jackson.deserialization.fail-on-unknown-properties=false
