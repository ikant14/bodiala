# Profile for running bodiala against the local hotelbeds-stub (../hotelbeds-stub).
# Activate with:  --spring.profiles.active=hotelbeds-stub
#
# Switches the active supplier to Hotelbeds and points its base URL at the stub (:9091).
# Placeholder credentials (NOT real) — the stub accepts any non-blank Api-key and does NOT verify
# the X-Signature. Set HOTELBEDS_API_KEY=invalid to exercise the error/502 path.
hotel.provider=hotelbeds
hotelbeds.base-url=http://localhost:9091
hotelbeds.api-key=${HOTELBEDS_API_KEY:stub-key}
hotelbeds.secret=${HOTELBEDS_SECRET:stub-secret}
# Seed the cache from the stub on startup (fresh DB only) so no manual POST /import is needed.
# Safe here because this profile always points at the local stub, never the real quota-limited API.
hotelbeds.import-on-startup=true
